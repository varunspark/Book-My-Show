apiVersion: v1
kind: ConfigMap
metadata:
  name: bookmyshow-config
  namespace: bookmyshow
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  # Add other non-sensitive configuration here
  REACT_APP_API_TIMEOUT: "30000"
  REACT_APP_RETRIES: "3"
---
apiVersion: v1
kind: Secret
metadata:
  name: bookmyshow-secrets
  namespace: bookmyshow
type: Opaque
stringData:
  # These should be injected by Jenkins or AWS Secrets Manager
  # NEVER commit actual secrets to git
  DATABASE_URL: "replace_with_actual_db_url"
  API_KEY: "replace_with_actual_api_key"
  JWT_SECRET: "replace_with_actual_jwt_secret"
